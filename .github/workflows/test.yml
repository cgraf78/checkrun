name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    # Delegates to the shared shell-ci reusable workflow, which sets up mise
    # (per .github/mise/checkrun-ci.toml), installs checkrun's own deps, then
    # runs the test-command argument. Reviewing CI coverage without leaving
    # this repo is intentional: any change to that workflow shows up here as a
    # SHA bump rather than as silent drift on a mutable branch.
    # To update the pin, run locally:
    #   gh api repos/cgraf78/actions/branches/main --jq '.commit.sha'
    # and replace the ref below (form: `...@<40-char-sha>`).
    uses: cgraf78/actions/.github/workflows/shell-ci.yml@485940fa141828a3f13430b5219a3d5c33c4f367
    with:
      setup: checkrun
      test-command: CHECKRUN_SKIP_SHELLCHECK_SUITES=1 test/checkrun-test

  shellcheck:
    # Dependency profiles and named setup modes are separate shared-workflow
    # paths. Keep ShellCheck on the profile path so every platform, including
    # Alpine where Checkrun's mise bootstrap is intentionally skipped, gets it.
    uses: cgraf78/actions/.github/workflows/shell-ci.yml@485940fa141828a3f13430b5219a3d5c33c4f367
    with:
      profiles: base,shellcheck
      test-command: test/suites/shellcheck-inventory-test && test/suites/shellcheck-test
